<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Lens Data Engine: A real-time data ingestion and analytics dashboard for tracking repository health, workflow metrics, and custom operational data."
    />
    <title>Lens | Data Engine</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header class="top-bar">
      <div class="top-bar-left">
        <h1 id="logo-btn" style="cursor: pointer" title="Back to Dashboard">
          Lens.
        </h1>
      </div>
      <div class="top-bar-right">
        <nav class="top-nav">
          <button class="top-nav-btn active" data-mode="repositories">
            Repositories
          </button>
          <button class="top-nav-btn" data-mode="artifacts">Artifacts</button>
        </nav>
        <div style="display: flex; align-items: center; gap: 12px"></div>
      </div>
    </header>
    <div class="app-layout">
      <aside class="sidebar">
        <nav class="sidebar-nav" id="sidebar-nav-dashboard">
          <div class="sidebar-controls">
            <input
              type="text"
              id="search-input"
              class="lens-input lens-input-sm"
              placeholder="Find..."
            />
          </div>

          <div
            class="nav-section"
            id="sidebar-group-control"
            style="flex-shrink: 0"
          >
            <div class="group-control">
              <div class="custom-dropdown" id="group-dropdown">
                <button
                  class="lens-input lens-input-sm dropdown-trigger"
                  id="group-dropdown-trigger"
                  aria-haspopup="listbox"
                  aria-expanded="false"
                >
                  <span id="group-dropdown-label">Group By: None</span>
                  <svg
                    class="dropdown-icon"
                    width="12"
                    height="12"
                    viewBox="0 0 24 24"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                  >
                    <polyline points="6 9 12 15 18 9"></polyline>
                  </svg>
                </button>
                <div
                  class="dropdown-menu"
                  id="group-dropdown-menu"
                  role="listbox"
                >
                  <!-- Populated via JS -->
                </div>
              </div>
            </div>
          </div>

          <div class="nav-section">
            <ul id="sidebar-list" class="repo-list">
              <!-- Dynamically populated -->
            </ul>
          </div>
        </nav>
      </aside>

      <main class="content">
        <header class="content-header">
          <h2 id="view-title">All Repositories</h2>
          <p id="view-subtitle">Overview of all aggregated data</p>

          <nav class="tabs">
            <button class="tab-btn active" data-tab="overview">Overview</button>
            <button class="tab-btn" data-tab="history">History</button>
          </nav>
        </header>

        <!-- OVERVIEW TAB -->
        <div id="tab-overview" class="tab-content active">
          <section
            class="metadata-section"
            id="metadata-section"
            style="display: none"
          >
            <div class="metadata-grid">
              <div class="metadata-card">
                <h3>Tags</h3>
                <ul id="current-tags" class="metadata-list"></ul>
              </div>
              <div class="metadata-card">
                <h3>Data</h3>
                <ul id="current-custom-data" class="metadata-list"></ul>
              </div>
            </div>
          </section>

          <section class="charts-section" id="overview-charts">
            <div id="dynamic-charts" class="dynamic-charts-grid">
              <!-- Auto-generated charts will go here -->
            </div>
          </section>

          <div
            id="artifact-trace-container"
            style="display: none; padding-top: var(--space-4)"
          >
            <div id="artifact-trace-timeline" class="artifact-trace-canvas">
              <!-- Dynamically populated via JS -->
            </div>
            <div
              id="trace-details-panel"
              class="trace-details-panel"
              style="display: none"
            >
              <div class="panel-header">
                <h3 id="panel-title">Event Details</h3>
              </div>
              <div id="panel-body" class="panel-body">
                <!-- Populated via JS -->
              </div>
            </div>
          </div>
        </div>

        <!-- HISTORY TAB -->
        <div id="tab-history" class="tab-content">
          <div class="search-container">
            <input
              type="text"
              id="history-search"
              class="lens-input lens-input-md"
              placeholder="Search ID, repository, commit, tags, or custom data..."
              autocomplete="off"
            />
          </div>
          <div id="pagination-controls" class="pagination-controls"></div>
          <div class="table-scroll-wrapper">
            <table id="data-table">
              <thead id="data-table-head"></thead>
              <tbody id="data-table-body"></tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
