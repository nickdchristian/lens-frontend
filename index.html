<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lens Dashboard</title>
  </head>
  <body>
    <header class="header">
      <div class="container flex items-center justify-between">
        <div>
          <h1 class="text-xl font-semibold">Lens</h1>
          <p class="text-sm text-secondary">Telemetry & Events</p>
        </div>
        <div class="text-sm text-tertiary">
          <span id="connection-status">Connecting...</span>
        </div>
      </div>
    </header>

    <main class="container">
      <div class="event-list" id="event-container">
        <!-- Events will be dynamically injected here -->
        <div class="card flex flex-col gap-sm" style="opacity: 0.5">
          <p class="text-sm text-secondary">Waiting for data...</p>
        </div>
      </div>
    </main>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
